spring:
  application:
    name: vita-clinica-agendamento

  # ───────────────────────────────────────────────
  # DATASOURCE — PostgreSQL (padrão)
  # Todas as variáveis têm fallback para dev local
  # ───────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vitaclinica}
    username: ${DB_USERNAME:vitaclinica_user}
    password: ${DB_PASSWORD:vitaclinica_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: VitaClinicaPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ───────────────────────────────────────────────
  # JPA / HIBERNATE
  # ddl-auto: validate → Flyway gerencia o schema
  # ───────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: America/Recife
    open-in-view: false

  # ───────────────────────────────────────────────
  # FLYWAY — migrations versionadas
  # ───────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false
    encoding: UTF-8

  # ───────────────────────────────────────────────
  # EMAIL — Resend via SMTP (ou qualquer provedor)
  # ───────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ───────────────────────────────────────────────
  # JACKSON
  # ───────────────────────────────────────────────
  jackson:
    time-zone: America/Recife
    date-format: yyyy-MM-dd
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# ───────────────────────────────────────────────
# SERVIDOR
# ───────────────────────────────────────────────
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1
    encoding:
      charset: UTF-8
      force: true
  error:
    include-message: always
    include-binding-errors: always

# ───────────────────────────────────────────────
# JWT
# secret: mínimo 256 bits (32 chars) para HS256
# expiration: 86400000ms = 24 horas
# ───────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:vita-clinica-secret-key-that-must-be-at-least-256-bits-long-for-hs256-algorithm}
  expiration: ${JWT_EXPIRATION:86400000}

# ───────────────────────────────────────────────
# VITA CLÍNICA — propriedades de negócio
# ───────────────────────────────────────────────
vita:
  clinica:
    nome: "Vita Clínica"
    email-remetente: ${EMAIL_REMETENTE:contato@vitaclinica.com.br}
    frontend-url: ${FRONTEND_URL:http://localhost:3000}
    # Horário de funcionamento
    horario:
      semana:
        inicio: "07:00"
        fim: "20:00"
      sabado:
        inicio: "08:00"
        fim: "13:00"
    # Duração das consultas
    consulta:
      duracao-minutos: 30
      intervalo-minutos: 10

# ───────────────────────────────────────────────
# SPRINGDOC OPENAPI — Swagger UI
# Acesso: http://localhost:8080/api/v1/swagger-ui.html
# ───────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    try-it-out-enabled: true
    filter: true
  show-actuator: false

# ───────────────────────────────────────────────
# LOGGING
# ───────────────────────────────────────────────
logging:
  level:
    com.vitaclinica: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  pattern:
    console: "%clr(%d{HH:mm:ss}){faint} %clr(%-5level){highlight} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} : %msg%n"
