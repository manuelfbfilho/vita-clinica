# ═══════════════════════════════════════════════
# PROFILE: dev
# Ativo com: --spring.profiles.active=dev
# Ou: SPRING_PROFILES_ACTIVE=dev
# ═══════════════════════════════════════════════
spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Em dev, seed de dados de teste
  flyway:
    locations:
      - classpath:db/migration

logging:
  level:
    com.vitaclinica: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.security: DEBUG
