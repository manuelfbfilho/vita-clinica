# ═══════════════════════════════════════════════
# PROFILE: dev
# Ativo com: --spring.profiles.active=dev
# Ou: SPRING_PROFILES_ACTIVE=dev
# ═══════════════════════════════════════════════
spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/vitaclinica
    username: vitaclinica_user
    password: vitaclinica_pass
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    locations:
      - classpath:db/migration

logging:
  level:
    com.vitaclinica: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.security: DEBUG
    